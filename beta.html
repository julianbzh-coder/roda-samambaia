<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Baque de maracatu - Samambaia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg-dark: #121212; --panel-bg: #1e1e1e; --control-bg: #252525;
            --text-main: #f5f5f5; --text-muted: #888;
            --accent-gold: #f1c40f; --accent-green: #2ecc71; --accent-red: #e74c3c;
        }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #left-panel { width: 340px; background-color: var(--panel-bg); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 10; height: 100%; }
        .panel-title { font-size: 13px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        #mixer-section { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .track-mixer { background-color: var(--control-bg); border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .track-mixer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .pattern-input { flex-grow: 1; background: #111; border: 1px solid #555; color: var(--accent-gold); padding: 5px; border-radius: 4px; font-family: monospace; width: 100%; box-sizing: border-box; }
        
        #right-panel { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #top-bar { height: 60px; background-color: var(--panel-bg); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        #canvas-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        canvas { max-width: 100%; max-height: 100%; aspect-ratio: 1 / 1; cursor: pointer; }
        button.control-btn { background-color: #333; color: #fff; border: 1px solid #444; padding: 6px 14px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="left-panel">
        <div class="panel-title">Mesa de Som (Table de mixage)</div>
        <div id="mixer-section"><div id="tracks-mixer-container"></div></div>
        <div id="legend-section">
            <div class="panel-title">Legenda (Légende)</div>
            <div style="font-size: 11px; color: #888;">
                • Alfaia/Caixa: <b>D</b>(Dir)/<b>d</b>(dir), <b>E</b>(Esq)/<b>e</b>(esq)<br>
                • Gonguê: <b>G</b>(Grave)/<b>A</b>(Agudo)<br>
                • Agbê: <b>D</b>(Dir)/<b>G</b>(Esq)
            </div>
        </div>
    </div>
    <div id="right-panel">
        <div id="top-bar">
            <div style="font-weight:bold; font-size:16px;">Baque de maracatu - Samambaia</div>
            <div>
                <button id="addBtn" class="control-btn" style="background: var(--accent-green);">+ Instrumento</button>
                <button id="playBtn" class="control-btn">▶ Play</button>
            </div>
        </div>
        <div id="canvas-container"><canvas id="canvas" width="1200" height="1200"></canvas></div>
    </div>

    <script>
        const instrumentsConfig = [
            { id: 'alf', name: 'Alfaia', type: 'hands' }, 
            { id: 'cxa', name: 'Caixa', type: 'hands' }, 
            { id: 'gon', name: 'Gonguê', type: 'gongue' }, 
            { id: 'agb', name: 'Agbê', type: 'shake' }
        ];

        let circles = [];
        let isPlaying = false;
        let currentStepIndex = 0;

        function renderMixer() {
            const container = document.getElementById('tracks-mixer-container');
            container.innerHTML = "";
            circles.forEach((c, index) => {
                const inst = instrumentsConfig[c.instrumentIdx];
                const div = document.createElement('div'); div.className = "track-mixer";
                div.innerHTML = `
                    <div class="track-mixer-header">
                        <span>${index + 1}. ${inst.name}</span>
                        <button onclick="deleteCircle(${c.id})">🗑️</button>
                    </div>
                    <input type="text" class="pattern-input" value="${c.activeSteps.join('')}" oninput="updatePattern(${c.id}, this.value)">
                `;
                container.appendChild(div);
            });
        }

        window.deleteCircle = function(id) {
            circles = circles.filter(x => x.id !== id);
            // Recalculer les rayons pour garder l'espacement intact après suppression
            circles.forEach((c, i) => c.radius = 120 + (i * 60));
            renderMixer();
        }

        window.updatePattern = function(id, val) {
            let c = circles.find(x => x.id === id);
            if(c) {
                let chars = val.split('');
                c.activeSteps = Array(16).fill(0).map((_, i) => chars[i] || 0);
            }
        };

        document.getElementById('addBtn').addEventListener('click', () => {
            if (circles.length < 10) {
                // Espacement mathématique : 120 (base) + (index * 60)
                circles.push({ 
                    id: Date.now(), 
                    radius: 120 + (circles.length * 60), 
                    steps: 16, 
                    activeSteps: Array(16).fill(0), 
                    instrumentIdx: 0 
                });
                renderMixer();
            }
        });

        function draw() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 1200, 1200);
            
            circles.forEach(c => {
                ctx.beginPath(); ctx.arc(600, 600, c.radius, 0, Math.PI*2); ctx.strokeStyle = '#555'; ctx.stroke();
                
                c.activeSteps.forEach((step, i) => {
                    if(step !== 0) {
                        let angle = (i / 16) * Math.PI * 2 - Math.PI/2;
                        let x = 600 + Math.cos(angle) * c.radius;
                        let y = 600 + Math.sin(angle) * c.radius;
                        ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#fff'; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center"; ctx.fillText(step, x, y+4);
                    }
                });
            });
            requestAnimationFrame(draw);
        }
        
        document.getElementById('playBtn').addEventListener('click', () => {
            isPlaying = !isPlaying;
            document.getElementById('playBtn').textContent = isPlaying ? "⏹ Stop" : "▶ Play";
        });

        draw();
    </script>
</body>
</html>
