<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BaqueMix</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <div id="loading-overlay">🌿 Chargement...</div>

    <div id="top-bar">
        <button id="btn-toggle-left">☰</button>
        <span id="title">BaqueMix</span>
        
        <label>BPM: <input type="number" id="bpm-input" value="83"></label>
        
        <button id="btn-play">▶</button>
        <button id="btn-save">💾</button>
        <input type="file" id="file-input" style="display:none">
        <button id="btn-load">📂</button>
    </div>

    <div id="main-workspace">
        <div id="left-panel">
            <div id="tracks-container"></div>
        </div>
        <canvas id="canvas-wheel" width="1000" height="1000"></canvas>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
