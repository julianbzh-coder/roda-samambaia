<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BaqueMix - Roda de Samambaia</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <meta name="description" content="BaqueMix: Application web interactive pour composer, apprendre et jouer les rythmes de Maracatu de Baque Virado. Séquenceur, métronome, et outils pédagogiques visuels.">
    <meta name="keywords" content="Maracatu, Baque Virado, Percussion, Tambour, Alfaia, Agbê, Séquenceur, Samambaia, Musique Brésilienne, BaqueMix">
    <meta name="author" content="JulianBZH">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg-dark: #121212; --panel-bg: #1e1e1e; --control-bg: #252525;
            --text-main: #f5f5f5; --text-muted: #888;
            --accent-gold: #f1c40f; --accent-green: #2ecc71; --accent-red: #8b0000;
        }

        body {
            margin: 0; background-color: var(--bg-dark); color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* --- BARRE GLOBALE DU HAUT --- */
        #top-bar { 
            width: 100%; height: auto; min-height: 70px; background-color: var(--panel-bg); 
            border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 20px; box-sizing: border-box; z-index: 20; flex-wrap: wrap; gap: 10px;
        }
        .topbar-group { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        
        #header-title-text { font-size: 26px; font-weight: 900; letter-spacing: 2px; color: var(--accent-gold); line-height: 1; margin: 0; padding: 0; }

        /* --- CONTENEUR DE L'ESPACE DE TRAVAIL --- */
        #main-workspace { display: flex; flex-grow: 1; overflow: hidden; position: relative; width: 100%; }

        /* --- PANNEAU GAUCHE (MIXEUR) --- */
        #left-panel {
            width: 400px; min-width: 400px; background-color: var(--panel-bg); border-right: 1px solid #333;
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 10; height: 100%;
            transition: margin-left 0.35s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        #left-panel.collapsed { margin-left: -400px; }

        /* --- PANNEAU DROIT (LÉGENDE ET LETRAS) --- */
        #right-sidebar {
            width: 340px; min-width: 340px; background-color: var(--panel-bg); border-left: 1px solid #333;
            display: flex; flex-direction: column; box-sizing: border-box; z-index: 10; height: 100%;
            transition: margin-right 0.35s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        #right-sidebar.collapsed { margin-right: -340px; }
        .sidebar-section { display: none; flex-direction: column; padding: 20px; height: 100%; overflow-y: auto; }
        .sidebar-section.active { display: flex; }

        .panel-title { font-size: 13px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }

        #mixer-section { flex-grow: 1; overflow-y: auto; padding-right: 5px; }

        .track-mixer { border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; margin-bottom: 10px; transition: background 0.3s; }
        .track-mixer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        
        .track-order-btns { display: flex; flex-direction: column; gap: 2px; margin-right: 8px; }
        .order-btn { background: #333; color: #fff; border: 1px solid #555; cursor: pointer; font-size: 8px; padding: 2px 6px; border-radius: 3px; }
        .order-btn:hover:not(:disabled) { background: var(--accent-gold); color: #000; }
        .order-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .track-name { font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* CUSTOM DROPDOWNS POUR LES ICONES D'INSTRUMENTS */
        .custom-dropdown { position: relative; outline: none; }
        .dropdown-list { display: none; position: absolute; top: 100%; left: 0; background: #222; border: 1px solid #555; border-radius: 6px; z-index: 100; min-width: 180px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); overflow: hidden; max-height: 250px; overflow-y: auto;}
        .dropdown-list.show { display: block; }
        .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; cursor: pointer; font-size: 13px; color: #fff; border-bottom: 1px solid #333; }
        .dropdown-item:hover { background: var(--accent-gold); color: #000; }
        .dropdown-item img { width: 24px; height: 24px; object-fit: contain; border-radius: 3px; }
        .dropdown-selected { display: flex; align-items: center; gap: 8px; background: #111; border: 1px solid #555; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; color: #fff; }
        .dropdown-selected img { width: 16px; height: 16px; object-fit: contain; border-radius: 2px; }

        .track-mute-solo { display: flex; gap: 4px; }
        .btn-mute-solo { width: 24px; height: 24px; background-color: #333; color: #fff; border: none; border-radius: 4px; font-weight: bold; font-size: 10px; cursor: pointer; }
        .btn-mute-solo.mute-on { background-color: var(--accent-red); }
        .btn-mute-solo.solo-on { background-color: var(--accent-gold); color: #000; }
        .btn-mute-solo.hidden-on { background-color: #34495e; color: #95a5a6; }
        .btn-delete { background-color: #444; } .btn-delete:hover { background-color: var(--accent-red); }

        .fader-group { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .fader { flex-grow: 1; -webkit-appearance: none; height: 6px; border-radius: 3px; background: #444; outline: none; width: 70px; }
        .fader::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer; }

        .vol-meter-bg { width: 35px; height: 8px; background-color: #000; border-radius: 2px; position: relative; overflow: hidden; }
        .vol-meter-bar { height: 100%; background-color: var(--accent-green); width: 0%; transition: width 0.05s; }

        .steps-config { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-muted); border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 6px; }
        .steps-config input { width: 40px; background: #111; border: 1px solid #555; color: #fff; padding: 2px; border-radius: 4px; text-align: center; }
        .steps-config-right { display: flex; align-items: center; gap: 6px; }

        .pattern-row { display: flex; align-items: flex-start; gap: 8px; margin-top: 8px; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 8px; }
        
        .step-boxes { display: flex; gap: 4px; flex-wrap: wrap; flex-grow: 1; align-items: center; justify-content: flex-start;}
        .step-box { width: 22px; height: 22px; background: #111; border: 1px solid #555; color: var(--accent-gold); font-family: monospace; font-size: 14px; font-weight: bold; text-align: center; border-radius: 4px; outline: none; padding: 0; box-sizing: border-box; transition: background-color 0.2s;}
        .step-box:focus { border-color: var(--accent-gold) !important; box-shadow: 0 0 4px var(--accent-gold); }
        
        /* --- CARTES VOIX --- */
        .v-card { display: flex; flex-direction: column; width: 48px; background: #1a1a1a; border: 1px solid #3a3a3a; border-radius: 4px; overflow: hidden; margin-right: 4px; margin-bottom: 4px; }
        .v-type { font-size: 9px; font-weight: bold; text-align: center; cursor: pointer; padding: 3px 0; color: #fff; user-select: none; }
        .v-type.empty { background: #444; color: #aaa; cursor: default; }
        .v-type.pux { background: #ff9f43; color:#121212; }
        .v-type.coro { background: #00d2d3; color:#121212; }
        .v-card.inactive .v-syl, .v-card.inactive .v-note { color: #666; }
        .v-syl { width: 100%; border: none; border-bottom: 1px solid #333; background: transparent; color: var(--accent-gold); text-align: center; font-size: 13px; padding: 6px 0; outline: none; font-weight: bold; }
        .v-note { width: 100%; border: none; background: transparent; color: #aaa; text-align: center; font-size: 10px; padding: 4px 0; outline: none; text-transform: uppercase;}

        /* LÉGENDE SCROLLABLE */
        .legend-container { display: flex; flex-direction: column; gap: 6px; padding-right: 5px; flex-grow: 1; }
        .legend-group { display: flex; flex-direction: column; gap: 4px; background: #181818; padding: 8px; border-radius: 6px; border: 1px solid #2a2a2a; }
        .legend-group-title { font-weight: bold; color: var(--accent-gold); margin-bottom: 2px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .legend-item { display: flex; align-items: center; gap: 8px; color: var(--text-main); font-size: 11px; line-height: 1.3; }
        .legend-badge { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 18px; font-size: 9px; font-weight: bold; border-radius: 4px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; flex-shrink: 0; }

        /* ZONE LETRAS ET KARAOKE */
        #letras-textarea {
            width: 100%; flex-grow: 1; background: #111; border: 1px solid #555; border-radius: 4px; 
            padding: 12px; box-sizing: border-box; overflow-y: auto; font-size: 16px; line-height: 1.8; 
            font-family: sans-serif; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        #letras-textarea:empty:before { content: attr(data-placeholder); color: #555; pointer-events: none; display: block; text-shadow: none; }
        #letras-textarea:focus { border-color: var(--accent-gold); outline: none; }
        
        .lyric-word { padding: 0 1px; border-radius: 3px; transition: all 0.1s; }
        .lyric-word.highlight { background-color: rgba(255, 255, 255, 0.3) !important; box-shadow: 0 0 8px rgba(255,255,255,0.6); color: #fff !important; }

        /* --- INTERFACE CENTRALE --- */
        #center-panel { flex-grow: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        
        /* -- BOUTONS ET ICONES -- */
        .preset-select { background-color: var(--control-bg); color: var(--text-main); border: 1px solid #444; padding: 6px 8px; border-radius: 6px; font-size: 13px; font-weight: bold; }
        button.control-btn { background-color: #333; color: #fff; border: 1px solid #444; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; transition: background-color 0.2s; display: flex; align-items: center; justify-content: center; }
        button.control-btn:hover { background-color: #444; }
        button#metroBtn.metro-on { background-color: var(--accent-gold); color: #000; border-color: var(--accent-gold); }
        .icon-btn { font-size: 20px !important; padding: 4px 10px !important; line-height: 1; }

        /* Bouton Enregistrement */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }
        #recordBtn.recording { background-color: var(--accent-red) !important; animation: pulse-red 1.5s infinite; }

        #rewindBtn {
            width: 40px; height: 40px; padding: 0 !important; border-radius: 50%;
            background-color: #8b0000; border: 2px solid #121212;
            box-shadow: 0 3px 6px rgba(0,0,0,0.6); margin-right: 10px;
        }
        #rewindBtn:hover { background-color: #600000; }

        .control-separator { width: 1px; height: 28px; background-color: #444; margin: 0 4px; }
        label.control-label { font-size: 13px; display: flex; align-items: center; gap: 6px; color: var(--text-main); font-weight: bold; }
        #bpm { width: 48px; background-color: var(--control-bg); color: var(--text-main); border: 1px solid #444; padding: 4px; border-radius: 6px; text-align: center; font-size: 14px; }

        #canvas-container { 
            flex-grow: 1; display: flex; align-items: center; justify-content: center; 
            background-color: var(--bg-dark); 
            /* Fond "Atelier/Craie" en arrière plan */
            background-image: url('Pictures/atelier.png'); 
            background-size: cover; background-position: center; background-repeat: no-repeat; 
            padding: 10px; box-sizing: border-box; overflow: hidden; position: relative;
        }
        canvas { max-width: 100%; max-height: 100%; aspect-ratio: 1 / 1; cursor: pointer; }
        
        #fileInput { display: none; }
        #loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(18,18,18,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-size: 18px; font-weight: bold; color: var(--accent-gold); }

        @media (max-width: 1000px) {
            body { overflow-y: auto; height: auto; min-height: 100vh; }
            #main-workspace { flex-direction: column; height: auto; overflow: visible; }
            #left-panel { order: 1; min-width: 100%; width: 100%; border: none; border-bottom: 1px solid #333; height: auto; margin-left: 0 !important; }
            #left-panel.collapsed { display: none; } 
            #center-panel { order: 2; width: 100%; height: auto; flex-grow: 0; }
            #right-sidebar { order: 3; min-width: 100%; width: 100%; border: none; border-top: 1px solid #333; height: auto; margin-right: 0 !important; }
            #right-sidebar.collapsed { display: none; }
            #top-bar { flex-direction: column; align-items: stretch; padding: 15px; gap: 15px; }
            .topbar-group { display: flex; flex-wrap: wrap; justify-content: center; width: 100%; gap: 10px; }
            #header-main { width: 100%; justify-content: center; position: relative; margin-bottom: 10px;}
            #toggleLeftBtn { position: absolute; left: 0; top: 50%; transform: translateY(-50%); margin: 0;}
            .control-separator { display: none; }
            #canvas-container { padding: 5px; min-height: 400px; }
            #header-title-text { display: none; } 
        }
    </style>
</head>
<body>

    <div id="loading-overlay">🌿 <span id="loading-text">Carregando vozes...</span></div>

    <div id="top-bar">
        <div class="topbar-group" id="header-main">
            <button id="toggleLeftBtn" class="control-btn icon-btn" title="Mostrar painel" onclick="togglePanel('left')" style="background: transparent; border: 1px solid #444; display: none;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <span id="header-title-text">BaqueMix</span>
        </div>
        
        <div class="topbar-group">
            <label class="control-label">
                <span id="tsLabel">Compasso:</span> 
                <select id="timeSigSelect" class="preset-select" onchange="updateTimeSig(this.value, false)">
                    <option value="4/4" selected>4/4</option>
                    <option value="3/4">3/4</option>
                    <option value="2/4">2/4</option>
                    <option value="6/8">6/8</option>
                    <option value="12/8">12/8</option>
                </select>
            </label>
            <div class="control-separator"></div>
            <label class="control-label">BPM: <input type="number" id="bpm" value="83" min="40" max="240" step="1"></label>
            <div class="control-separator"></div>
            <label class="control-label">Vol: <input type="range" id="masterVol" class="master-vol-fader" min="-40" max="6" value="-6"></label>
            <div class="control-separator"></div>
            
            <button id="metroBtn" class="control-btn icon-btn" title="Metrônomo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 5 22 19 22"></polygon><circle cx="12" cy="16" r="2" fill="currentColor"></circle><line x1="12" y1="16" x2="7" y2="7"></line>
                </svg>
            </button>
            
            <button id="rewindBtn" title="Parar e Voltar ao início / Stop & Rewind">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#121212" stroke="#121212" stroke-width="2" stroke-linejoin="round">
                    <polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5" stroke-width="3"></line>
                </svg>
            </button>
            
            <select id="presetSelect" class="preset-select" onchange="onPresetChange(this.value)">
                <option value="vou-vadiar" selected>Vou vadiar carnaval</option>
                <option value="baque-de-imale">Baque de Imale</option>
            </select>
        </div>

        <div class="topbar-group">
            <button id="langBtn" class="control-btn icon-btn" onclick="toggleLang()" style="background:#8e44ad; font-size: 22px; width: 50px; padding: 4px;" title="Changer de langue / Mudar idioma">🇫🇷</button>
            <button id="tutorialBtn" class="control-btn icon-btn" title="Tutorial / Ajuda" onclick="window.open('https://www.youtube.com/results?search_query=maracatu+tutorial', '_blank')" style="background:#e67e22;">📺</button>
            <div class="control-separator"></div>
            
            <div class="custom-dropdown" id="dropdown-add" tabindex="0" onblur="closeDropdown('dropdown-add')">
                <button class="control-btn" style="background-color: var(--accent-green); color: #000; font-weight:bold;" onclick="toggleDropdown('list-add')">+ Instrumento</button>
                <div class="dropdown-list" id="list-add" style="right:0; left:auto; top:40px; max-height:300px;">
                    </div>
            </div>
            
            <button id="recordBtn" class="control-btn icon-btn" title="Gravar Áudio / Enregistrer Audio" onclick="toggleRecord()" style="background:#444;">🔴</button>

            <button id="clearBtn" class="control-btn icon-btn" title="Limpar a Roda">🗑️</button>
            <button id="saveBtn" class="control-btn icon-btn" title="Salvar" style="background:#2980b9;">💾</button>
            <button id="loadBtn" class="control-btn icon-btn" title="Carregar" style="background:#2980b9;">📂</button>
            <input type="file" id="fileInput" accept=".json">

            <div class="control-separator"></div>
            <button id="toggleLegendBtn" class="control-btn icon-btn" title="Legenda" onclick="toggleRightPanel('legend')" style="background: transparent; border: 1px solid #444; margin-right:4px;">📖</button>
            <button id="toggleLetrasBtn" class="control-btn icon-btn" title="Letras" onclick="toggleRightPanel('letras')" style="background: transparent; border: 1px solid #444;">📝</button>
        </div>
    </div>

    <div id="main-workspace">
        
        <div id="left-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px;">
                <span class="panel-title" id="title-mixer" style="margin: 0; border: none; padding: 0;">🎛️ Misturador</span>
                <button class="control-btn icon-btn" title="Ocultar painel" onclick="togglePanel('left')" style="background: transparent; border: 1px solid #444; padding: 4px 10px !important;">◀</button>
            </div>
            <div id="mixer-section"><div id="tracks-mixer-container"></div></div>
        </div>

        <div id="canvas-container">
            <canvas id="canvas" width="1200" height="1200"></canvas>
        </div>

        <div id="right-sidebar" class="collapsed">
            
            <div id="legend-section" class="sidebar-section">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom:
