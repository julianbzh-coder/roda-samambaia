<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BaqueMix - Roda de Samambaia</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        /* --- POLICE CACTUS --- */
        @font-face {
            font-family: 'Cactus';
            src: url('Cactus Regular.otf') format('opentype');
        }

        :root {
            /* Couleurs Cordel / Bois */
            --bg-dark: #0a0807; 
            --cordel-bg1: #1c1815; 
            --cordel-bg2: #120e0c;
            --cordel-chalk: #eaddcf; /* Couleur craie pour les cadres */
            --control-bg: #2a2420;
            --text-main: #f5f5f5; 
            --text-muted: #a0958a;
            --accent-gold: #f1c40f; --accent-green: #2ecc71; --accent-red: #8b0000;
        }

        body {
            margin: 0; background-color: var(--bg-dark); color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* --- PANNEAUX (Fond bois encré) --- */
        #top-bar { 
            width: 100%; min-height: 70px; 
            background: linear-gradient(180deg, var(--cordel-bg1), var(--cordel-bg2));
            border-bottom: 2px solid var(--cordel-chalk); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 20px; box-sizing: border-box; z-index: 20; flex-wrap: wrap; gap: 10px;
        }
        #left-panel {
            width: 400px; min-width: 400px; 
            background: linear-gradient(180deg, var(--cordel-bg1), var(--cordel-bg2));
            border-right: 2px solid var(--cordel-chalk);
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 10; height: 100%;
            transition: margin-left 0.35s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        #right-sidebar {
            width: 340px; min-width: 340px; 
            background: linear-gradient(180deg, var(--cordel-bg1), var(--cordel-bg2));
            border-left: 2px solid var(--cordel-chalk);
            display: flex; flex-direction: column; box-sizing: border-box; z-index: 10; height: 100%;
            transition: margin-right 0.35s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        #left-panel.collapsed { margin-left: -400px; }
        #right-sidebar.collapsed { margin-right: -340px; }
        .sidebar-section { display: none; flex-direction: column; padding: 20px; height: 100%; overflow-y: auto; }
        .sidebar-section.active { display: flex; }

        /* --- TYPOGRAPHIE CORDEL --- */
        .panel-title { 
            font-family: 'Cactus', sans-serif; 
            font-size: 26px; /* Agrandit pour la lisibilité */
            color: var(--cordel-chalk); 
            letter-spacing: 2px; 
            margin-bottom: 15px; 
            border-bottom: 1px solid var(--cordel-chalk); 
            padding-bottom: 5px; 
            text-transform: uppercase;
        }
        #header-title-text { 
            font-family: 'Cactus', sans-serif; 
            font-size: 42px; 
            color: var(--cordel-chalk); 
            line-height: 1; margin: 0; padding: 0; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #main-workspace { display: flex; flex-grow: 1; overflow: hidden; position: relative; width: 100%; }
        #mixer-section { flex-grow: 1; overflow-y: auto; padding-right: 5px; }

        /* --- PISTES MIXEUR (Style Gravure/Xilogravura) --- */
        .track-mixer { 
            position: relative;
            border: 2px solid var(--cordel-chalk); /* Bordure externe épaisse */
            border-radius: 0; /* Arêtes franches */
            padding: 15px; 
            margin-bottom: 15px; 
            background-color: var(--cordel-bg2);
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        /* Ligne interne fine du cadre Cordel */
        .track-mixer::after {
            content: ''; position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid var(--cordel-chalk);
            pointer-events: none; /* Ne bloque pas les clics */
        }
        .track-mixer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; position: relative; z-index: 2;}
        .track-order-btns { display: flex; flex-direction: column; gap: 2px; margin-right: 8px; }
        .order-btn { background: #333; color: #fff; border: 1px solid #555; cursor: pointer; font-size: 8px; padding: 2px 6px; border-radius: 0; }
        .order-btn:hover:not(:disabled) { background: var(--cordel-chalk); color: #000; }
        .order-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .custom-dropdown { position: relative; outline: none; }
        .dropdown-list { display: none; position: absolute; top: 100%; left: 0; background: #222; border: 1px solid var(--cordel-chalk); z-index: 100; min-width: 180px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); max-height: 250px; overflow-y: auto;}
        .dropdown-list.show { display: block; }
        .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; cursor: pointer; font-size: 13px; color: #fff; border-bottom: 1px solid #333; }
        .dropdown-item:hover { background: var(--accent-gold); color: #000; }
        .dropdown-item img { width: 24px; height: 24px; object-fit: contain; }
        .dropdown-selected { display: flex; align-items: center; gap: 8px; background: #111; border: 1px solid #555; padding: 4px 8px; font-size: 11px; cursor: pointer; color: #fff; }
        .dropdown-selected img { width: 16px; height: 16px; object-fit: contain; }

        .track-mute-solo { display: flex; gap: 4px; }
        .btn-mute-solo { width: 24px; height: 24px; background-color: #333; color: #fff; border: 1px solid #555; font-weight: bold; font-size: 10px; cursor: pointer; border-radius: 0;}
        .btn-mute-solo.mute-on { background-color: var(--accent-red); border-color: var(--accent-red);}
        .btn-mute-solo.solo-on { background-color: var(--accent-gold); color: #000; border-color: var(--accent-gold);}
        .btn-mute-solo.hidden-on { background-color: #34495e; color: #95a5a6; }
        .btn-delete { background-color: #444; } .btn-delete:hover { background-color: var(--accent-red); }

        .fader-group { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; position: relative; z-index: 2;}
        .fader { flex-grow: 1; -webkit-appearance: none; height: 4px; background: #444; outline: none; width: 70px; }
        .fader::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 16px; background: var(--cordel-chalk); cursor: pointer; border-radius: 0; }
        .vol-meter-bg { width: 35px; height: 8px; background-color: #000; border-radius: 0; position: relative; overflow: hidden; border: 1px solid #333;}
        .vol-meter-bar { height: 100%; background-color: var(--accent-green); width: 0%; transition: width 0.05s; }

        .steps-config { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-muted); border-top: 1px dashed rgba(234,221,207,0.3); padding-top: 6px; position: relative; z-index: 2;}
        .steps-config input { width: 40px; background: #111; border: 1px solid #555; color: #fff; padding: 2px; text-align: center; border-radius: 0;}
        .steps-config-right { display: flex; align-items: center; gap: 6px; }

        .pattern-row { display: flex; align-items: flex-start; gap: 8px; margin-top: 8px; border-top: 1px dashed rgba(234,221,207,0.3); padding-top: 8px; position: relative; z-index: 2;}
        .step-boxes { display: flex; gap: 4px; flex-wrap: wrap; flex-grow: 1; align-items: center; justify-content: flex-start;}
        .step-box { width: 22px; height: 22px; background: #111; border: 1px solid #555; color: var(--accent-gold); font-family: monospace; font-size: 14px; font-weight: bold; text-align: center; outline: none; padding: 0; box-sizing: border-box; transition: background-color 0.2s; border-radius: 0;}
        .step-box:focus { border-color: var(--cordel-chalk) !important; box-shadow: 0 0 4px var(--cordel-chalk); }
        
        .v-card { display: flex; flex-direction: column; width: 48px; background: #1a1a1a; border: 1px solid #3a3a3a; overflow: hidden; margin-right: 4px; margin-bottom: 4px; }
        .v-type { font-size: 9px; font-weight: bold; text-align: center; cursor: pointer; padding: 3px 0; color: #fff; user-select: none; }
        .v-type.empty { background: #444; color: #aaa; cursor: default; }
        .v-type.pux { background: #ff9f43; color:#121212; }
        .v-type.coro { background: #00d2d3; color:#121212; }
        .v-card.inactive .v-syl, .v-card.inactive .v-note { color: #666; }
        .v-syl { width: 100%; border: none; border-bottom: 1px solid #333; background: transparent; color: var(--accent-gold); text-align: center; font-size: 13px; padding: 6px 0; outline: none; font-weight: bold; }
        .v-note { width: 100%; border: none; background: transparent; color: #aaa; text-align: center; font-size: 10px; padding: 4px 0; outline: none; text-transform: uppercase;}

        .legend-container { display: flex; flex-direction: column; gap: 6px; padding-right: 5px; flex-grow: 1; }
        .legend-group { display: flex; flex-direction: column; gap: 4px; background: #181818; padding: 8px; border: 1px solid var(--cordel-chalk); position: relative;}
        .legend-group::after { content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; border: 1px dashed rgba(234,221,207,0.3); pointer-events: none;}
        .legend-group-title { font-weight: bold; color: var(--accent-gold); margin-bottom: 2px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; z-index: 2;}
        .legend-item { display: flex; align-items: center; gap: 8px; color: var(--text-main); font-size: 11px; line-height: 1.3; z-index: 2;}
        .legend-badge { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 18px; font-size: 9px; font-weight: bold; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; flex-shrink: 0; border-radius: 0;}

        #letras-textarea {
            width: 100%; flex-grow: 1; background: #111; border: 1px solid var(--cordel-chalk); 
            padding: 12px; box-sizing: border-box; overflow-y: auto; font-size: 16px; line-height: 1.8; 
            font-family: sans-serif; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); border-radius: 0;
        }
        #letras-textarea:empty:before { content: attr(data-placeholder); color: #555; pointer-events: none; display: block; text-shadow: none; }
        #letras-textarea:focus { border-color: var(--accent-gold); outline: none; }
        
        .lyric-word { padding: 0 2px; transition: all 0.1s ease-in-out; display: inline-block; }
        .lyric-word.highlight { background-color: rgba(255, 255, 255, 0.25) !important; box-shadow: 0 0 10px rgba(255,255,255,0.6); color: #fff !important; transform: scale(1.15); z-index: 2; position: relative;}

        #center-panel { flex-grow: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        .preset-select { background-color: var(--control-bg); color: var(--text-main); border: 1px solid var(--cordel-chalk); padding: 6px 8px; font-size: 13px; font-weight: bold; border-radius: 0;}
        .topbar-group { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        button.control-btn { background-color: #333; color: var(--cordel-chalk); border: 1px solid var(--cordel-chalk); padding: 8px 16px; cursor: pointer; font-size: 14px; font-weight: bold; transition: background-color 0.2s; display: flex; align-items: center; justify-content: center; border-radius: 0;}
        button.control-btn:hover { background-color: var(--cordel-chalk); color: #000; }
        button#metroBtn.metro-on { background-color: var(--accent-gold); color: #000; border-color: var(--accent-gold); }
        .icon-btn { font-size: 20px !important; padding: 4px 10px !important; line-height: 1; }

        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }
        #recordBtn.recording { background-color: var(--accent-red) !important; animation: pulse-red 1.5s infinite; border-color: var(--accent-red);}
        #rewindBtn { width: 40px; height: 40px; padding: 0 !important; border-radius: 50%; background-color: #8b0000; border: 2px solid #121212; box-shadow: 0 3px 6px rgba(0,0,0,0.6); margin-right: 10px; cursor: pointer;}
        #rewindBtn:hover { background-color: #600000; }
        .control-separator { width: 1px; height: 28px; background-color: #444; margin: 0 4px; }
        label.control-label { font-size: 13px; display: flex; align-items: center; gap: 6px; color: var(--cordel-chalk); font-weight: bold; }
        #bpm { width: 48px; background-color: var(--control-bg); color: var(--text-main); border: 1px solid var(--cordel-chalk); padding: 4px; text-align: center; font-size: 14px; border-radius: 0;}

        #canvas-container { 
            flex-grow: 1; display: flex; align-items: center; justify-content: center; 
            background-color: var(--bg-dark); 
            background-image: url('Pictures/atelier.png'); background-size: cover; background-position: center; background-repeat: no-repeat; 
            padding: 10px; box-sizing: border-box; overflow: hidden; position: relative;
        }
        canvas { max-width: 100%; max-height: 100%; aspect-ratio: 1 / 1; cursor: pointer; }
        
        #fileInput { display: none; }
        #loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(18,18,18,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-size: 18px; font-weight: bold; color: var(--accent-gold); }

        @media (max-width: 1000px) {
            body { overflow-y: auto; height: auto; min-height: 100vh; }
            #main-workspace { flex-direction: column; height: auto; overflow: visible; }
            #left-panel, #right-sidebar { width: 100%; border: none; height: auto; margin: 0 !important; }
            #left-panel { order: 1; border-bottom: 2px solid var(--cordel-chalk); }
            #right-sidebar { order: 3; border-top: 2px solid var(--cordel-chalk); }
            #left-panel.collapsed, #right-sidebar.collapsed { display: none; } 
            #center-panel { order: 2; width: 100%; height: auto; flex-grow: 0; }
            #top-bar { flex-direction: column; padding: 15px; }
            #canvas-container { padding: 5px; min-height: 400px; }
            #header-title-text { display: none; } 
        }
    </style>
</head>
<body>
    <div id="loading-overlay">🌿 <span id="loading-text">Carregando vozes...</span></div>
    <div id="top-bar">
        <div class="topbar-group" id="header-main">
            <button id="toggleLeftBtn" class="control-btn icon-btn" title="Mostrar painel" onclick="togglePanel('left')" style="display: none;">◀</button>
            <span id="header-title-text">BaqueMix</span>
        </div>
        <div class="topbar-group">
            <label class="control-label"><span id="tsLabel">Compasso:</span> 
                <select id="timeSigSelect" class="preset-select" onchange="updateTimeSig(this.value, false)">
                    <option value="4/4" selected>4/4</option><option value="3/4">3/4</option><option value="2/4">2/4</option>
                    <option value="6/8">6/8</option><option value="12/8">12/8</option>
                </select>
            </label>
            <div class="control-separator"></div>
            <label class="control-label">BPM: <input type="number" id="bpm" value="83" min="40" max="240" step="1"></label>
            <div class="control-separator"></div>
            <label class="control-label">Vol: <input type="range" id="masterVol" class="master-vol-fader" min="-40" max="6" value="-6"></label>
            <div class="control-separator"></div>
            <button id="metroBtn" class="control-btn icon-btn" title="Metrônomo">🔔</button>
            <button id="rewindBtn" title="Stop">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#121212" stroke="#121212" stroke-width="2" stroke-linejoin="round">
                    <polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5" stroke-width="3"></line>
                </svg>
            </button>
            <select id="presetSelect" class="preset-select" onchange="onPresetChange(this.value)"></select>
        </div>
        <div class="topbar-group">
            <button id="langBtn" class="control-btn icon-btn" onclick="toggleLang()" style="background:#8e44ad; width: 50px; border-color:#8e44ad;">🇫🇷</button>
            <button id="tutorialBtn" class="control-btn icon-btn" title="Tutorial" onclick="window.open('https://youtube.com', '_blank')" style="background:#e67e22; border-color:#e67e22;">📺</button>
            <div class="control-separator"></div>
            <div class="custom-dropdown" id="dropdown-add" tabindex="0" onblur="closeDropdown('dropdown-add')">
                <button class="control-btn" style="background-color: var(--accent-green); color: #000;" onclick="toggleDropdown('list-add')">+ Instrumento</button>
                <div class="dropdown-list" id="list-add"></div>
            </div>
            <button id="recordBtn" class="control-btn icon-btn" onclick="toggleRecord()">🔴</button>
            <button id="clearBtn" class="control-btn icon-btn">🗑️</button>
            <button id="saveBtn" class="control-btn icon-btn" style="background:#2980b9; border-color:#2980b9;">💾</button>
            <button id="loadBtn" class="control-btn icon-btn" style="background:#2980b9; border-color:#2980b9;">📂</button>
            <input type="file" id="fileInput" accept=".json">
            <div class="control-separator"></div>
            <button id="toggleLegendBtn" class="control-btn icon-btn" onclick="toggleRightPanel('legend')">📖</button>
            <button id="toggleLetrasBtn" class="control-btn icon-btn" onclick="toggleRightPanel('letras')">📝</button>
        </div>
    </div>
    <div id="main-workspace">
        <div id="left-panel">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="panel-title" id="title-mixer">MISTURADOR</span>
                <button class="control-btn icon-btn" onclick="togglePanel('left')" style="background: transparent;">◀</button>
            </div>
            <div id="mixer-section"><div id="tracks-mixer-container"></div></div>
        </div>
        <div id="canvas-container"><canvas id="canvas" width="1200" height="1200"></canvas></div>
        <div id="right-sidebar" class="collapsed">
            <div id="legend-section" class="sidebar-section">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="panel-title" id="title-legend">LEGENDA</span>
                    <button class="control-btn icon-btn" onclick="toggleRightPanel('legend')" style="background: transparent;">▶</button>
                </div>
                <div class="legend-container">
                    <div class="legend-group"><span class="legend-group-title" id="legend-seq-title">Dicas de digitação</span><div class="legend-item" id="legend-seq-1"><span>Pressione Espaço.</span></div><div class="legend-item" id="legend-seq-2"><span>Use as Setas.</span></div></div>
                    <div class="legend-group"><span class="legend-group-title" id="legend-voice-title">Vozes / Coro</span><div class="legend-item" id="legend-voice-1"><span>Clique PUX/CORO.</span></div></div>
                    <div style="font-size: 11px; margin-top: 8px; margin-bottom: 4px; color: var(--accent-gold); line-height: 1.35;" id="legend-gold">💡 Regra: Maiúscula = Forte</div>
                    <div class="legend-group"><span class="legend-group-title" id="legend-ac-title">Alfaia & Caixa</span><div class="legend-item" id="legend-ac-1"><span>D / d (Direita)</span></div><div class="legend-item" id="legend-ac-2"><span>G / g (Esquerda)</span></div></div>
                </div>
            </div>
            <div id="letras-section" class="sidebar-section">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="panel-title" id="letras-title">LETRAS</span>
                    <button class="control-btn icon-btn" onclick="toggleRightPanel('letras')" style="background: transparent;">▶</button>
                </div>
                <button class="control-btn" id="extractBtn" onclick="extractLyrics()" style="margin-bottom: 12px; width: 100%; background: #2c3e50;">🔄 Extrair do mixador</button>
                <div id="letras-textarea" contenteditable="true" data-placeholder="Cole as letras..."></div>
            </div>
        </div>
    </div>

    <script>
        // --- LOGIQUE UI ET TRADUCTION ---
        window.toggleDropdown = function(lId) { let l = document.getElementById(lId); if(l.classList.contains('show')){l.classList.remove('show');}else{document.querySelectorAll('.dropdown-list.show').forEach(e=>e.classList.remove('show')); l.classList.add('show');} }
        window.closeDropdown = function(cId) { setTimeout(() => { let l = document.querySelector(`#${cId} .dropdown-list`); if(l) l.classList.remove('show'); }, 150); }
        document.addEventListener('DOMContentLoaded', () => { if (window.innerWidth <= 1000) { document.getElementById('left-panel').classList.add('collapsed'); document.getElementById('toggleLeftBtn').style.display = 'flex'; } updateStaticTexts(); populateAddDropdown(); refreshCirclesLayout(); draw(); });
        function togglePanel(side) { if (side === 'left') { let p = document.getElementById('left-panel'); p.classList.toggle('collapsed'); document.getElementById('toggleLeftBtn').style.display = p.classList.contains('collapsed') ? 'flex' : 'none'; } }
        let activeRightPanel = null;
        function toggleRightPanel(pName) { const sb = document.getElementById('right-sidebar'); const ls = document.getElementById('legend-section'); const lts = document.getElementById('letras-section'); if (sb.classList.contains('collapsed')) { sb.classList.remove('collapsed'); activeRightPanel = pName; } else { if (activeRightPanel === pName) { sb.classList.add('collapsed'); activeRightPanel = null; return; } else { activeRightPanel = pName; } } ls.classList.toggle('active', activeRightPanel === 'legend'); lts.classList.toggle('active', activeRightPanel === 'letras'); }
        const i18n = { pt: { loading: "Carregando...", mixer: "MISTURADOR", legend: "LEGENDA", letrasTitle: "LETRAS", extractBtn: "🔄 Extrair do mixador", save: "Salvar", promptVoice: "Sílaba (Ex: C4:Vou):" }, fr: { loading: "Chargement...", mixer: "MIXEUR", legend: "LÉGENDE", letrasTitle: "PAROLES", extractBtn: "🔄 Extraire les paroles", save: "Sauvegarder", promptVoice: "Syllabe (Ex: C4:Vou):" } };
        let currentLang = 'pt'; function t(key) { return i18n[currentLang][key] || key; }
        function updateStaticTexts() { document.getElementById('loading-text').innerText = t('loading'); document.getElementById('title-mixer').innerText = t('mixer'); document.getElementById('title-legend').innerText = t('legend'); document.getElementById('letras-title').innerText = t('letrasTitle'); document.getElementById('extractBtn').innerText = t('extractBtn'); }
        function toggleLang() { currentLang = currentLang === 'pt' ? 'fr' : 'pt'; document.getElementById('langBtn').innerText = currentLang === 'pt' ? '🇫🇷' : '🇧🇷'; updateStaticTexts(); renderMixer(); populateAddDropdown(); }

        // --- KARAOKE BUG FIX ---
        window.extractLyrics = function() {
            let voiceCircles = circles.filter(c => instrumentsConfig[c.instrumentIdx].type === 'voice');
            let htmlArr = [];
            voiceCircles.forEach(c => {
                let trackHtml = "";
                for(let i=0; i<c.steps; i++) {
                    if(c.activeSteps[i] !== 0 && c.lyrics[i]) {
                        let syl = c.lyrics[i].trim();
                        let color = c.activeSteps[i] === 'P' ? '#ff9f43' : '#00d2d3'; 
                        let cleanSyl = syl.replace(/-/g, '');
                        let separator = syl.endsWith('-') ? '' : ' ';

                            </div>
                        </div>
                        <div class="track-mute-solo">
                            <button class="btn-mute-solo ${c.isMute ? 'mute-on' : ''}" onclick="toggleMute(${c.id})">M</button>
                            <button class="btn-mute-solo ${c.isSolo ? 'solo-on' : ''}" onclick="toggleSolo(${c.id})">S</button>
                            <button class="btn-mute-solo ${c.isHidden ? 'hidden-on' : ''}" onclick="toggleHide(${c.id})">${c.isHidden ? '🙈' : '👁️'}</button>
                            <button class="btn-mute-solo btn-delete" onclick="deleteCircle(${c.id})">🗑️</button>
                        </div>
                    </div>
                    <div class="fader-group">
                        <input type="range" class="fader" min="0" max="100" value="${c.volumeVal}" oninput="updateVolume(${c.id}, this.value)">
                        <div class="vol-meter-bg"><div class="vol-meter-bar" id="meter-bar-${c.id}"></div></div>
                    </div>
                    <div class="steps-config">
                        <div class="steps-config-right"><span>Passos:</span><input type="number" value="${c.steps}" min="2" max="32" onchange="updateSteps(${c.id}, this.value)"></div>
                        <div class="steps-config-right"><span title="Repetições">🔄 x</span><input type="number" value="${c.repeats || 1}" min="1" max="64" style="width:30px;" onchange="updateRepeats(${c.id}, this.value)"></div>
                    </div>
                    <div class="pattern-row">${inputHtml}</div>
                `;
                container.appendChild(div);
            });
        }

        window.updateRepeats = function(id, val) { let c = circles.find(x => x.id === id); if (c) { c.repeats = parseInt(val) || 1; renderMixer(); } }
        window.toggleVoiceType = function(id, sIdx) { let c = circles.find(x => x.id === id); if(c.activeSteps[sIdx] === 0) return; c.activeSteps[sIdx] = c.activeSteps[sIdx] === 'P' ? 'C' : 'P'; renderMixer(); }
        window.updateVoiceSyl = function(id, sIdx, val, el) { let c = circles.find(x => x.id === id); c.lyrics[sIdx] = val; let card = el.closest('.v-card'); let typeEl = card.querySelector('.v-type'); if (val.trim() !== '') { card.classList.remove('inactive'); if(c.activeSteps[sIdx] === 0) { c.activeSteps[sIdx] = 'C'; if (!c.notes[sIdx]) c.notes[sIdx] = 'C4'; } typeEl.className = c.activeSteps[sIdx] === 'P' ? 'v-type pux' : 'v-type coro'; typeEl.innerText = c.activeSteps[sIdx] === 'P' ? 'PUX' : 'CORO'; } else { c.activeSteps[sIdx] = 0; card.classList.add('inactive'); typeEl.className = 'v-type empty'; typeEl.innerText = '---'; } }
        window.updateVoiceNote = function(id, sIdx, val) { let c = circles.find(x => x.id === id); c.notes[sIdx] = val; }
        window.formatNoteBlur = function(id, sIdx, el) { let val = el.value.trim(); if (/^[a-gA-G][#b]?$/.test(val)) { val = val.toUpperCase() + "4"; el.value = val; circles.find(x => x.id === id).notes[sIdx] = val; } }
        window.navVoiceBox = function(el, e, type) { let k = e.key; if (k==='ArrowRight'||k==='ArrowLeft') { let cards = Array.from(el.closest('.step-boxes').querySelectorAll('.v-card')); let idx = cards.indexOf(el.closest('.v-card')); if(k==='ArrowRight'&&idx<cards.length-1) cards[idx+1].querySelector(type==='syl'?'.v-syl':'.v-note').focus(); else if(k==='ArrowLeft'&&idx>0) cards[idx-1].querySelector(type==='syl'?'.v-syl':'.v-note').focus(); e.preventDefault(); } }

        window.onStepBoxInput = function(el, e) {
            let char = el.value.slice(-1); let c = circles.find(x => x.id === parseInt(el.getAttribute('data-circle'))); if(!c) return;
            let sIdx = parseInt(el.getAttribute('data-step')); let inst = instrumentsConfig[c.instrumentIdx]; let p = 0;
            if (char && char.trim() !== '') {
                if (inst.type === 'gongue') { p = (char==='G')?'GRV':(char==='g')?'grv':(char==='A')?'AIG':(char==='a')?'aig':0; } 
                else if (inst.id === 'mineiro') { p = ['P','T','p','t'].includes(char)?char:0; } 
                else { p = ['D','G','d','g'].includes(char)?char:0; }
            }
            if (p !== 0) {
                c.activeSteps[sIdx] = p; el.value = (inst.type==='gongue')?((p==='GRV')?'G':(p==='grv')?'g':(p==='AIG')?'A':'a'):p;
                let bC = inst.colors[p] || '#111'; let tC = (inst.id === 'gongue' && (p === 'AIG' || p === 'aig')) ? '#000' : inst.colors.text || '#fff';
                el.style.backgroundColor = bC; el.style.borderColor = bC; el.style.color = tC;
                let next = el.nextElementSibling; while (next && next.tagName !== 'INPUT') next = next.nextElementSibling; if (next) { next.focus(); next.select(); }
            } else {
                c.activeSteps[sIdx] = 0; el.value = ''; el.style.backgroundColor = '#111'; el.style.borderColor = '#555'; el.style.color = 'var(--accent-gold)';
                if (char === ' ') { let next = el.nextElementSibling; while (next && next.tagName !== 'INPUT') next = next.nextElementSibling; if (next) { next.focus(); next.select(); } }
            }
        };

        window.onStepBoxKey = function(el, e) {
            if (e.key === 'Backspace' && el.value === '') { let prev = el.previousElementSibling; while (prev && prev.tagName !== 'INPUT') prev = prev.previousElementSibling; if(prev) { prev.focus(); prev.select(); } e.preventDefault(); } 
            else if (e.key === 'ArrowRight') { let next = el.nextElementSibling; while (next && next.tagName !== 'INPUT') next = next.nextElementSibling; if(next) { next.focus(); next.select(); } e.preventDefault(); } 
            else if (e.key === 'ArrowLeft') { let prev = el.previousElementSibling; while (prev && prev.tagName !== 'INPUT') prev = prev.previousElementSibling; if(prev) { prev.focus(); prev.select(); } e.preventDefault(); }
        };

        window.toggleMute = function(id) { let c = circles.find(x => x.id === id); if(c) c.isMute = !c.isMute; renderMixer(); };
        window.toggleSolo = function(id) { let c = circles.find(x => x.id === id); if(c) c.isSolo = !c.isSolo; renderMixer(); };
        window.toggleHide = function(id) { let c = circles.find(x => x.id === id); if (c) c.isHidden = !c.isHidden; renderMixer(); };
        window.deleteCircle = function(id) { circles = circles.filter(x => x.id !== id); refreshCirclesLayout(); };

        window.updateInstrument = function(id, instIdx) {
            let c = circles.find(x => x.id === id);
            if (c) { c.instrumentIdx = parseInt(instIdx); c.activeSteps = Array(c.steps).fill(0); c.lyrics = Array(c.steps).fill(""); c.notes = Array(c.steps).fill(""); let instId = instrumentsConfig[c.instrumentIdx].id; let db = Tone.gainToDb(c.volumeVal / 100); channels[instId].volume.value = c.volumeVal <= 4 ? -Infinity : db; renderMixer(); }
        };

        window.updateVolume = function(id, v) { let c = circles.find(x => x.id === id); if(c) { c.volumeVal = parseInt(v); let instId = instrumentsConfig[c.instrumentIdx].id; channels[instId].volume.value = v <= 4 ? -Infinity : Tone.gainToDb(v / 100); } };
        window.updateSteps = function(id, s) { let c = circles.find(x => x.id === id); if (c) { let sn = parseInt(s) || 4; c.steps = sn; let na = Array(sn).fill(0); let nl = Array(sn).fill(""); let nn = Array(sn).fill(""); for(let i=0; i<Math.min(sn, c.activeSteps.length); i++) { na[i] = c.activeSteps[i]; nl[i] = c.lyrics[i]; nn[i] = c.notes[i]; } c.activeSteps = na; c.lyrics = nl; c.notes = nn; renderMixer(); } };

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect(); const dx = ((e.clientX - rect.left) * (canvas.width / rect.width)) - centerX; const dy = ((e.clientY - rect.top) * (canvas.height / rect.height)) - centerY; const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 55) { togglePlay(); return; }
            circles.forEach((c) => {
                if (c.isHidden) return;
                if (Math.abs(dist - c.radius) < 18) {
                    let cA = Math.atan2(dy, dx) + Math.PI / 2; if (cA < 0) cA += Math.PI * 2; const sAS = (Math.PI * 2) / c.steps;
                    for (let i = 0; i < c.steps; i++) {
                        let aD = Math.abs(cA - (i * sAS)); if (aD > Math.PI) aD = Math.PI * 2 - aD;
                        if (aD < sAS / 2) {
                            const inst = instrumentsConfig[c.instrumentIdx]; let cur = c.activeSteps[i];
                            if (inst.id === 'mineiro') { c.activeSteps[i] = (cur===0)?'p':(cur==='p')?'P':(cur==='P')?'t':(cur==='t')?'T':0; } 
                            else if (inst.id === 'agbe') { c.activeSteps[i] = (cur===0)?'g':(cur==='g')?'G':(cur==='G')?'d':(cur==='d')?'D':0; } 
                            else if (inst.type === 'gongue') { c.activeSteps[i] = (cur===0)?'grv':(cur==='grv')?'GRV':(cur==='GRV')?'aig':(cur==='aig')?'AIG':0; } 
                            else if (inst.type === 'voice') {
                                let l = prompt(t('promptVoice'), (c.notes[i] ? c.notes[i]+":" : "") + (cur==='P'?'*':'') + (c.lyrics[i]||""));
                                if (l !== null) {
                                    l = l.trim(); if (l === '') { c.activeSteps[i] = 0; c.lyrics[i] = ""; c.notes[i] = ""; } else {
                                        let nV = ""; let sV = l; if (l.includes(':')) { let p = l.split(':'); nV = p[0].trim(); sV = p[1].trim(); if (/^[a-gA-G][#b]?$/.test(nV)) nV += "4"; }
                                        c.activeSteps[i] = sV.startsWith('*') ? 'P' : 'C'; c.lyrics[i] = sV.replace('*','').substring(0, 15); c.notes[i] = nV.toUpperCase();
                                    }
                                }
                            } else { c.activeSteps[i] = (cur===0)?'d':(cur==='d')?'D':(cur==='D')?'g':(cur==='g')?'G':0; }
                            renderMixer(); return;
                        }
                    }
                }
            });
        });

        async function togglePlay() {
            if (!isPlaying) { await Tone.start(); mainLoop.start(0); Tone.Transport.start(); isPlaying = true; } 
            else { mainLoop.stop(); Tone.Transport.pause(); instrumentsConfig.forEach(i => { if (samplers[i.id]) samplers[i.id].stopAll(); if (voiceSynths[i.id]) voiceSynths[i.id].triggerRelease(); }); isPlaying = false; }
        }

        document.getElementById('rewindBtn').addEventListener('click', () => { mainLoop.stop(); Tone.Transport.stop(); instrumentsConfig.forEach(i => { if (samplers[i.id]) samplers[i.id].stopAll(); if (voiceSynths[i.id]) voiceSynths[i.id].triggerRelease(); }); isPlaying = false; currentStepIndex = -1; measureCount = 0; Tone.Transport.seconds = 0; currentAngle = -Math.PI / 2; });
        document.getElementById('bpm').addEventListener('change', (e) => { let v = Math.round(Number(e.target.value)); if(v<40)v=40; if(v>240)v=240; e.target.value = v; Tone.Transport.bpm.value = v; });
        document.getElementById('masterVol').addEventListener('input', (e) => { let v = parseFloat(e.target.value); Tone.Destination.volume.value = v === -40 ? -Infinity : v; });
        const metroBtn = document.getElementById('metroBtn'); metroBtn.addEventListener('click', () => { isMetroOn = !isMetroOn; metroBtn.classList.toggle('metro-on', isMetroOn); });
        document.getElementById('clearBtn').addEventListener('click', () => { circles = []; document.getElementById('letras-textarea').innerHTML = ""; refreshCirclesLayout(); });
        document.getElementById('saveBtn').addEventListener('click', () => { const ds = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ bpm: Tone.Transport.bpm.value, timeSig: timeSignature, letras: document.getElementById('letras-textarea').innerHTML, circles: circles })); const dl = document.createElement('a'); dl.href = ds; dl.download = "rythme.json"; dl.click(); });
        
        const fileInput = document.getElementById('fileInput'); document.getElementById('loadBtn').addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const f = e.target.files[0]; if (!f) return; const r = new FileReader();
            r.onload = function(evt) { try { const d = JSON.parse(evt.target.result); if(d.bpm){document.getElementById('bpm').value=Math.round(d.bpm);Tone.Transport.bpm.value=Math.round(d.bpm);} if(d.circles){circles=d.circles;circles.forEach(c=>normalizeCircleData(c));} updateTimeSig(d.timeSig||"4/4", 'skip'); document.getElementById('letras-textarea').innerHTML=d.letras||""; refreshCirclesLayout(); } catch (err) { alert("Erro de arquivo!"); } }; r.readAsText(f);
        });

        function loadPresetFile(fN) { fetch(fN).then(r=>r.json()).then(d=>{ if(d.circles){circles=JSON.parse(JSON.stringify(d.circles));circles.forEach(c=>normalizeCircleData(c));} if(d.bpm){document.getElementById('bpm').value=Math.round(d.bpm);Tone.Transport.bpm.value=Math.round(d.bpm);} updateTimeSig(d.timeSig||"4/4", 'skip'); document.getElementById('letras-textarea').innerHTML=d.letras||""; refreshCirclesLayout(); }).catch(e=>{}); }
        function onPresetChange(v) { if (v.endsWith('.json')) loadPresetFile(v); }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT' && e.target.id !== 'letras-textarea') { e.preventDefault(); togglePlay(); } });
    </script>
</body>
</html>
