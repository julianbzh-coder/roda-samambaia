<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BaqueMix - Roda de Samambaia</title>
    <meta name="description" content="BaqueMix: Application web interactive pour composer, apprendre et jouer les rythmes de Maracatu de Baque Virado.">
    <meta name="keywords" content="Maracatu, Baque Virado, Percussion, Tambour, Séquenceur, BaqueMix">
    <meta name="author" content="JulianBZH">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cactus+Classical+Serif&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        @font-face {
            font-family: 'Cactus';
            src: url('Cactus Regular.otf') format('opentype');
        }

        :root {
            --bg-dark: #121212; 
            --panel-bg: #1e1e1e; 
            --control-bg: #252525;
            --text-main: #f5f5f5; 
            --text-muted: #888;
            --accent-gold: #eaddcf; /* Couleur Parchemin de Xilographura */
            --accent-green: #2ecc71; 
            --accent-red: #8b0000;
        }

        /* --- LAYOUT GLOBAL --- */
        body {
            margin: 0; 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }

        #top-bar { 
            width: 100%; 
            min-height: 70px; 
            background-color: var(--panel-bg); 
            border-bottom: 2px solid #000; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 10px 20px; 
            box-sizing: border-box; 
            z-index: 20; 
            flex-wrap: wrap; 
            gap: 10px;
        }

        .topbar-group { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            flex-wrap: wrap; 
        }

        #header-title-text { 
            font-family: 'Cactus', 'Cactus Classical Serif', serif; 
            font-size: 40px; 
            color: var(--accent-gold); 
            letter-spacing: 2px; 
            margin: 0; 
            text-shadow: 2px 2px 0px #000, 3px 3px 0px var(--accent-red);
        }

        #main-workspace { 
            display: flex; 
            flex-grow: 1; 
            overflow: hidden; 
            position: relative; 
            width: 100%; 
        }

        /* --- PANNEAUX LATERAUX (BOIS FONCÉ) --- */
        #left-panel, #right-sidebar { 
            background: linear-gradient(135deg, #1c1815 0%, #120e0c 100%); 
            box-sizing: border-box; 
            z-index: 10; 
            height: 100%; 
            transition: margin 0.35s cubic-bezier(0.4, 0.0, 0.2, 1); 
        }

        #left-panel { 
            width: 440px; 
            min-width: 440px; 
            border-right: 3px solid #000; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
        }

        #left-panel.collapsed { margin-left: -440px; }

        #right-sidebar { 
            width: 360px; 
            min-width: 360px; 
            border-left: 3px solid #000; 
            display: flex; 
            flex-direction: column; 
        }

        #right-sidebar.collapsed { margin-right: -360px; }

        .sidebar-section { 
            display: none; 
            flex-direction: column; 
            padding: 20px; 
            height: 100%; 
            overflow-y: auto; 
        }
        .sidebar-section.active { display: flex; }

        /* --- DESIGN XILOGRAVURA / CORDEL --- */
        .panel-header-cordel { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid var(--accent-gold); 
            padding-bottom: 8px; 
            margin-bottom: 24px; 
            position: relative; 
        }

        .panel-header-cordel::after { 
            content: ''; 
            position: absolute; 
            left: 0; right: 0; bottom: -5px; 
            height: 1px; 
            background-color: var(--accent-gold); 
        }

        .panel-title { 
            font-size: 26px; 
            font-family: 'Cactus', serif; 
            color: var(--accent-gold); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin: 0; 
            text-shadow: 2px 2px 0px rgba(0,0,0,0.8); 
        }

        /* --- INTERFACE CENTRALE / RODA --- */
        #canvas-container { 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: var(--bg-dark); 
            background-image: url('Pictures/atelier.png'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            padding: 10px; 
            position: relative;
        }

        canvas { 
            max-width: 100%; 
            max-height: 100%; 
            aspect-ratio: 1 / 1; 
            cursor: pointer; 
            z-index: 5;
        }

        /* --- CONTROLES & BOUTONS --- */
        button.control-btn { 
            background-color: #222; 
            color: var(--accent-gold); 
            border: 2px solid var(--accent-gold); 
            padding: 8px 16px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: bold; 
            font-family: 'Cactus', serif; 
            letter-spacing: 1px; 
            transition: all 0.1s; 
            box-shadow: 2px 2px 0px #000;
        }

        button.control-btn:hover { 
            background-color: #333; 
            transform: translate(-1px,-1px); 
            box-shadow: 3px 3px 0px #000; 
            color: #fff;
        }

        button.control-btn:active { 
            transform: translate(2px,2px); 
            box-shadow: 0px 0px 0px #000; 
        }

        .icon-btn { font-size: 20px !important; padding: 4px 12px !important; line-height: 1; }

        #loading-overlay { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(18,18,18,0.96); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 9999; 
            font-size: 28px; 
            font-family: 'Cactus', serif; 
            color: var(--accent-gold); 
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 1100px) {
            body { overflow-y: auto; height: auto; min-height: 100vh; }
            #main-workspace { flex-direction: column; height: auto; overflow: visible; }
            #left-panel, #right-sidebar { width: 100%; height: auto; border: none; }
            #left-panel { border-bottom: 4px solid #000; }
            #right-sidebar { border-top: 4px solid #000; }
            #left-panel.collapsed, #right-sidebar.collapsed { display: none; } 
        }
    </style>
</head>
<body>

    <div id="loading-overlay">🌿 <span id="loading-text">Carregando vozes...</span></div>

    <div id="top-bar">
        <div class="topbar-group" id="header-main">
            <button id="toggleLeftBtn" class="control-btn icon-btn" title="Mostrar Misturador" onclick="toggleLeft()" style="display: none;">☰</button>
            <span id="header-title-text">BaqueMix</span>
        </div>
        
        <div class="topbar-group">
            <label class="control-label">
                <span id="tsLabel">Compasso:</span> 
                <select id="timeSigSelect" class="preset-select" onchange="changeTimeSignature(this.value)">
                    <option value="4/4" selected>4/4</option>
                    <option value="3/4">3/4</option>
                    <option value="2/4">2/4</option>
                    <option value="6/8">6/8</option>
                    <option value="12/8">12/8</option>
                </select>
            </label>
            <label class="control-label">BPM: <input type="number" id="bpmInput" value="83" min="40" max="240"></label>
            <button id="metroBtn" class="control-btn icon-btn" title="Metrônomo">⏱️</button>
            <button id="rewindBtn" title="Rewind">⏮</button>
            <select id="presetDropdown" class="preset-select" onchange="loadPreset(this.value)">
                <option value="vou-vadiar" selected>Vou vadiar carnaval</option>
                <option value="baque-de-imale">Baque de Imale</option>
            </select>
        </div>

        <div class="topbar-group">
            <button id="langToggleBtn" class="control-btn icon-btn" onclick="toggleLanguage()">🇫🇷</button>
            <button id="recordBtn" class="control-btn icon-btn" title="Record">🔴</button>
            <button id="delAllBtn" class="control-btn icon-btn" title="Limpar tudo">🗑️</button>
            <button id="savFlBtn" class="control-btn icon-btn" title="Baixar">💾</button>
            <button id="lodFlBtn" class="control-btn icon-btn" title="Carregar JSON" onclick="document.getElementById('hidLoadInp').click()">📂</button>
            <input type="file" id="hidLoadInp" accept=".json" style="display:none;">
            <button id="btgLegend" class="control-btn icon-btn" title="Legenda" onclick="toggleRightPanel('legend')">📖</button>
            <button id="btgLetras" class="control-btn icon-btn" title="Letras Karaoké" onclick="toggleRightPanel('letras')">📝</button>
        </div>
    </div>

    <div id="main-workspace">
        <div id="left-panel">
            <div class="panel-header-cordel">
                <span class="panel-title" id="lblPanMixer">Misturador</span>
                <button class="control-btn icon-btn" onclick="toggleLeft()">◀</button>
            </div>
            <div id="mixer-section"><div id="tracks-mixer-container"></div></div>
        </div>

        <div id="canvas-container">
            <canvas id="appWheelDraw" width="1200" height="1200"></canvas>
        </div>

        <div id="right-sidebar" class="collapsed">
            <div id="blkLegend" class="sidebar-section">
                <div class="panel-header-cordel">
                    <span class="panel-title" id="lblPanLegenda">Legenda</span>
                    <button class="control-btn icon-btn" onclick="toggleRightPanel('legend')">▶</button>
                </div>
                </div>

            <div id="blkLetras" class="sidebar-section">
                <div class="panel-header-cordel">
                    <span class="panel-title" id="lblPanLetras">Letras (Karaokê)</span>
                    <button class="control-btn icon-btn" onclick="toggleRightPanel('letras')">▶</button>
                </div>
                <button class="control-btn" id="btGenerateWords" onclick="extractLyrics()">⬇ Extrair e Sincronizar o Karaokê!</button>
                <div id="textLivro" contenteditable="true" data-placeholder="Vazio no momento..."></div>
            </div>
        </div>
    </div> 

    <script>
        // État Global de l'Application
        const AppState = {
            isPlaying: false,
            isMetroOn: false,
            measureCount: 0,
            currentStepIndex: -1,
            currentAngle: -Math.PI / 2,
            isRecording: false,
            circles: [],
            timeSignature: "4/4",
            maxTicks: 96,
            currentLang: 'pt',
            activeRightPanel: null
        };

        const AudioState = {
            channels: {},
            meters: {},
            samplers: {},
            voiceSynths: {},
            loadedInstrumentsCount: 0
        };

        // Configuration des Instruments
        const instrumentsConfig = [
            { id: 'marcante', iconImg: 'icones/alfaia.svg', name: 'Alfaia Marcante', type: 'hands', path: 'Alfaia/Marcante', colors: { 'd': '#7a0e0e', 'D': '#bd0202', 'g': '#de5e5e', 'G': '#f04141', text: '#fff' } },
            { id: 'caixa', iconImg: 'icones/caixa.svg', name: 'Caixa', type: 'hands', path: 'Caixa', colors: { 'd': '#3f0c78', 'D': '#6721bb', 'g': '#a14eba', 'G': '#af24c9', text: '#fff' } },
            { id: 'gongue', iconImg: 'icones/gongue.svg', name: 'Gonguê', type: 'gongue', path: 'Gongue', colors: { 'grv': '#222', 'GRV': '#000', 'aig': '#7a8181', 'AIG': '#bac2c2', text: '#fff' } },
            { id: 'agbe', iconImg: 'icones/agbe.svg', name: 'Agbê', type: 'shake', path: 'Graines/Agbe', colors: { 'g': '#1a541c', 'G': '#247c29', 'd': '#5fc262', 'D': '#50b853', text: '#121212' } },
            { id: 'chant', iconImg: 'icones/micro.svg', name: 'Voz / Coro', type: 'voice', path: 'internal', colors: { 'C': '#00d2d3', 'P': '#2980b9', text: '#121212' } }
        ];

        // Initialisation Audio (Tone.js)
        Tone.context.lookAhead = 0.04; 
        Tone.context.latencyHint = "interactive"; 
        Tone.Destination.volume.value = -6;

        const metronomeSynth = new Tone.Synth({
            oscillator: { type: "square" }, 
            envelope: { attack: 0.001, decay: 0.05, sustain: 0.0, release: 0.01 }, 
            volume: 6 
        }).toDestination();
        
        instrumentsConfig.forEach(inst => {
            AudioState.channels[inst.id] = new Tone.Channel({ volume: 0 }).toDestination();
            AudioState.meters[inst.id] = new Tone.Meter();
            AudioState.channels[inst.id].connect(AudioState.meters[inst.id]);
            
            if(inst.type === 'voice'){ 
                AudioState.voiceSynths[inst.id] = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.05, decay: 0.2 }, volume: -8 }).connect(AudioState.channels[inst.id]);
            } else { 
                let audioFiles = (inst.type === 'gongue') 
                    ? {"faible-grave":"faible-grave.wav", "fort-grave":"fort-grave.wav", "faible-aigue":"faible-aigue.wav", "fort-aigue":"fort-aigue.wav"} 
                    : {"faible":"faible.wav", "fort":"fort.wav"};
                
                AudioState.samplers[inst.id] = new Tone.Players({ 
                    urls: audioFiles, 
                    baseUrl: `sons-maracatu/${inst.path}/`, 
                    onload: () => { 
                        AudioState.loadedInstrumentsCount++; 
                        if(AudioState.loadedInstrumentsCount >= instrumentsConfig.filter(i => i.type !== 'voice').length) {
                            document.getElementById('loading-overlay').style.display = 'none'; 
                        }
                    } 
                }).connect(AudioState.channels[inst.id]);
            }
        });

        // Retrait de sécurité pour l'écran de chargement
        window.addEventListener('load', () => setTimeout(() => document.getElementById('loading-overlay').style.display='none', 2000));

        // Dictionnaire des Langues
        const translations = {
            pt: { mix: "MISTURADOR", tsLbl: "Compasso:", extb: "⬇ SINCRONIZAR A PÁGINA (Letra e Kantos)" },
            fr: { mix: "SÉQUENCEUR (Mix)", tsLbl: "Metrique Tempo:", extb: "🔄 COLLER LES LETTRES" }
        };

        function toggleLanguage() {
            AppState.currentLang = AppState.currentLang === 'pt' ? 'fr' : 'pt'; 
            document.getElementById('langToggleBtn').innerText = AppState.currentLang === 'pt' ? '🇫🇷' : '🇧🇷';
            document.getElementById('lblPanMixer').innerText = translations[AppState.currentLang].mix;
            // Rafraichir l'UI ici...
        }

        // Toggles d'interface
        function toggleLeft() { 
            document.getElementById('left-panel').classList.toggle('collapsed'); 
            document.getElementById('toggleLeftBtn').style.display = document.getElementById('left-panel').classList.contains('collapsed') ? 'flex' : 'none'; 
        }

        function toggleRightPanel(panelName) { 
            const sidebar = document.getElementById('right-sidebar'); 
            const legendPanel = document.getElementById('blkLegend'); 
            const letrasPanel = document.getElementById('blkLetras');
            
            if (sidebar.classList.contains('collapsed')){ 
                sidebar.classList.remove('collapsed'); 
                AppState.activeRightPanel = panelName;
            } else { 
                if(AppState.activeRightPanel === panelName){
                    sidebar.classList.add('collapsed'); 
                    AppState.activeRightPanel = null; 
                    return;
                } else {
                    AppState.activeRightPanel = panelName;
                }
            } 
            legendPanel.classList.toggle('active', AppState.activeRightPanel === 'legend');
            letrasPanel.classList.toggle('active', AppState.activeRightPanel === 'letras');
        }

        // Fonction Karaoké nettoyée
        function extractLyrics() {
            let voiceCircles = AppState.circles.filter(c => instrumentsConfig[c.instrumentIdx].type === 'voice'); 
            let finalHtmlArray = [];
            
            voiceCircles.forEach(circle => {
                let currentWordHtml = ""; 
                let lineHtml = " ";
                
                for(let i = 0; i < circle.steps; i++) {
                    if (circle.activeSteps[i] !== 0 && circle.lyrics[i]){
                        let rawSyllable = circle.lyrics[i].trim(); 
                        let isPuxador = circle.activeSteps[i] === 'P'; 
                        let color = isPuxador ? '#2980b9' : '#00d2d3'; 
                        let hasDash = rawSyllable.endsWith('-'); 
                        let cleanSyllable = hasDash ? rawSyllable.slice(0,-1) : rawSyllable;
                        
                        currentWordHtml += `<span class="lyric-word lyric-ref-${circle.id}-${i}" style="color:${color};">${cleanSyllable}</span>`;
                        
                        if(!hasDash) { 
                            lineHtml += `<span style="white-space:nowrap; display:inline-block; margin-right:7px;">${currentWordHtml}</span>`; 
                            currentWordHtml = ""; 
                        }
                    }
                } 
                if(currentWordHtml.length > 0) lineHtml += `<span style="white-space:nowrap; display:inline-block; margin-right:7px;">${currentWordHtml}</span>`;
                if(lineHtml.trim()) finalHtmlArray.push(lineHtml.trim());
            }); 
            document.getElementById('textLivro').innerHTML = finalHtmlArray.join('<br><div style="height:6px;"></div>');
        }

        function changeTimeSignature(newSig, skipRebuild = false) {
            AppState.timeSignature = newSig; 
            if(newSig === "4/4") AppState.maxTicks = 96; 
            else if(newSig === "3/4" || newSig === "6/8") AppState.maxTicks = 72; 
            else if(newSig === "2/4") AppState.maxTicks = 48; 
            else if(newSig === "12/8") AppState.maxTicks = 144;
            
            document.getElementById('timeSigSelect').value = newSig; 
            AppState.currentStepIndex = -1; 
            AppState.measureCount = 0;
            // Logique de reconstruction de la timeline ici...
        }

        // Le rendu de la Roda (Canvas) a été simplifié visuellement dans sa structure, 
        // tu pourras y réinsérer tes variables contextuelles proprement.
        function drawRoda() {
            const canvas = document.getElementById('appWheelDraw');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            ctx.clearRect(0,0, canvas.width, canvas.height); 
            ctx.save();
            
            // Dessin de fond...
            // Calcul des angles...
            
            ctx.restore();
            requestAnimationFrame(drawRoda);
        }

        // Démarrage de la boucle de rendu
        window.addEventListener('DOMContentLoaded', () => { 
            if (window.innerWidth <= 1100) { toggleLeft(); } 
            requestAnimationFrame(drawRoda);
        });
    </script>
</body>
</html>
