<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Roda de Maracatu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #121212; color: #fff; font-family: sans-serif; display: flex; height: 100vh; }
        #left-panel { width: 300px; background: #1e1e1e; padding: 20px; border-right: 1px solid #333; }
        .inst-item { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
        #top-bar { height: 60px; display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid #333; }
        #logo { height: 40px; }
        canvas { cursor: crosshair; }
    </style>
</head>
<body>

<div id="left-panel">
    <h3>Mixer</h3>
    <div id="mixer"></div>
</div>

<div style="flex-grow:1;">
    <div id="top-bar">
        <img id="logo" src="logo-samambaia.png" onerror="this.style.display='none'" alt="Logo">
        <h2>MARACATU SAMAMBAIA</h2>
        <button onclick="document.getElementById('modal').style.display='block'">+ Ajouter Instrument</button>
        <button onclick="toggleAudio()" id="playBtn">▶ Play</button>
    </div>
    <canvas id="canvas" width="800" height="700"></canvas>
</div>

<div id="modal" style="display:none; position:fixed; top:20%; left:40%; background:#333; padding:20px; border-radius:10px;">
    <h3>Choisir instrument</h3>
    <select id="selInst"></select>
    <button onclick="addInst()">Ajouter</button>
    <button onclick="document.getElementById('modal').style.display='none'">Fermer</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let circles = [];
    let isPlaying = false;

    const instTypes = [
        { id: 'alfaia', name: 'Alfaia', color: '#8b0000' },
        { id: 'gongue', name: 'Gonguê', color: '#bdc3c7' },
        { id: 'agbe', name: 'Agbê', color: '#4caf50' },
        { id: 'puxador', name: 'Puxador', color: '#5dade2' }
    ];

    document.getElementById('selInst').innerHTML = instTypes.map((i,idx) => `<option value="${idx}">${i.name}</option>`).join('');

    function addInst() {
        const idx = document.getElementById('selInst').value;
        circles.push({ ...instTypes[idx], steps: 16, active: new Array(16).fill(false) });
        document.getElementById('modal').style.display = 'none';
        renderMixer();
    }

    function renderMixer() {
        const mix = document.getElementById('mixer');
        mix.innerHTML = circles.map((c, i) => `
            <div class="inst-item">
                <span>${c.name}</span>
                <button onclick="circles.splice(${i},1); renderMixer();">🗑️</button>
            </div>
        `).join('');
    }

    // --- MOTEUR DE DESSIN ---
    function draw() {
        ctx.clearRect(0,0,800,700);
        circles.forEach((c, index) => {
            let radius = 100 + (index * 50);
            // Cercle guide
            ctx.beginPath(); ctx.arc(400, 350, radius, 0, Math.PI*2);
            ctx.strokeStyle = '#444'; ctx.stroke();
            // Pas
            for(let i=0; i<16; i++) {
                let angle = (i/16) * Math.PI*2 - Math.PI/2;
                let x = 400 + Math.cos(angle) * radius;
                let y = 350 + Math.sin(angle) * radius;
                ctx.fillStyle = c.active[i] ? c.color : '#333';
                ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2); ctx.fill();
            }
        });
        requestAnimationFrame(draw);
    }
    draw();

    // Interaction
    canvas.addEventListener('click', e => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left - 400;
        const my = e.clientY - rect.top - 350;
        const dist = Math.sqrt(mx*mx + my*my);
        
        circles.forEach((c, index) => {
            let r = 100 + (index * 50);
            if (Math.abs(dist - r) < 20) {
                let angle = Math.atan2(my, mx) + Math.PI/2;
                if(angle < 0) angle += Math.PI*2;
                let step = Math.floor((angle / (Math.PI*2)) * 16);
                c.active[step] = !c.active[step];
            }
        });
    });

    function toggleAudio() {
        Tone.start();
        isPlaying ? Tone.Transport.stop() : Tone.Transport.start();
        isPlaying = !isPlaying;
    }
</script>
</body>
</html>
