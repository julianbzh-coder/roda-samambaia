<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Roda de Maracatu - Samambaia Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --bg-dark: #121212; --panel-bg: #1e1e1e; --text-main: #f5f5f5; }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-main); font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #left-panel { width: 350px; background-color: var(--panel-bg); padding: 15px; border-right: 1px solid #333; }
        .track-mixer { background: #252525; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; }
        #canvas { cursor: pointer; }
        #add-modal { display: none; position: fixed; top: 30%; left: 35%; background: #333; padding: 20px; z-index: 1000; border-radius: 8px; border: 1px solid #555; }
    </style>
</head>
<body>
    <div id="add-modal">
        <h3>Ajouter un instrument</h3>
        <select id="instSelect" style="width: 100%; padding: 8px;"></select><br><br>
        <button onclick="confirmAdd()" style="background:green; color:white; padding:8px; border:none; cursor:pointer;">Ajouter</button>
        <button onclick="document.getElementById('add-modal').style.display='none'">Annuler</button>
    </div>

    <div id="left-panel">
        <h3>🎛️ Mixer</h3>
        <div id="mixer-section"></div>
        <div id="legend-section" style="font-size: 11px; margin-top: 20px; color: #aaa;"></div>
    </div>

    <div style="flex-grow:1; display:flex; flex-direction:column;">
        <div style="padding:20px;">
            <button onclick="document.getElementById('add-modal').style.display='block'">+ Ajouter Instrument</button>
            <button id="playBtn" onclick="togglePlay()" style="background:green; color:white;">▶ Play</button>
        </div>
        <canvas id="canvas" width="700" height="700"></canvas>
    </div>

<script>
    const synth = new Tone.PolySynth(Tone.Synth).toDestination();
    let circles = [];
    let isPlaying = false;
    let currentStep = 0;
    let chantIndex = 0;

    let instrumentsConfig = [
        { id: 'marcante', name: 'Alfaia Marcante', color: '#8b0000', type: 'perc' },
        { id: 'gongue', name: 'Gonguê', color: '#bdc3c7', type: 'perc' },
        { id: 'agbe', name: 'Agbê', color: '#4caf50', type: 'perc' },
        { id: 'chant', name: 'Chant', color: '#3498db', type: 'voice' },
        { id: 'puxador', name: 'Puxador', color: '#5dade2', type: 'voice' }
    ];

    function renderMixer() {
        const container = document.getElementById('mixer-section');
        container.innerHTML = "";
        circles.forEach((c, index) => {
            const inst = instrumentsConfig.find(i => i.id === c.instId);
            const div = document.createElement('div');
            div.className = "track-mixer";
            div.innerHTML = `<div>${inst.name}</div>
                             <button onclick="circles.splice(${index},1); renderMixer();">🗑️ Supprimer</button>`;
            container.appendChild(div);
        });
    }

    function confirmAdd() {
        const instId = document.getElementById('instSelect').value;
        circles.push({ instId: instId, steps: 16, activeSteps: new Array(16).fill(false), radius: 80 + (circles.length * 30) });
        document.getElementById('add-modal').style.display = 'none';
        renderMixer();
    }

    // Initialisation modal
    document.getElementById('instSelect').innerHTML = instrumentsConfig.map(i => `<option value="${i.id}">${i.name}</option>`).join('');

    // --- MOTEUR DE DESSIN ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function draw() {
        ctx.clearRect(0,0,700,700);
        circles.forEach(c => {
            const inst = instrumentsConfig.find(i => i.id === c.instId);
            ctx.beginPath(); ctx.arc(350, 350, c.radius, 0, Math.PI*2);
            ctx.strokeStyle = inst.color; ctx.stroke();
            
            for(let i=0; i<c.steps; i++) {
                let angle = (i/c.steps) * Math.PI * 2 - Math.PI/2;
                let x = 350 + Math.cos(angle) * c.radius;
                let y = 350 + Math.sin(angle) * c.radius;
                ctx.fillStyle = c.activeSteps[i] ? inst.color : "#333";
                ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI*2); ctx.fill();
            }
        });
        requestAnimationFrame(draw);
    }
    draw();

    // --- MOTEUR AUDIO ---
    new Tone.Loop((time) => {
        let voiceChants = circles.filter(c => ['chant', 'puxador'].includes(c.instId));
        
        circles.forEach(c => {
            if(c.activeSteps[currentStep % c.steps]) {
                if(['chant', 'puxador'].includes(c.instId)) {
                    if (c === voiceChants[chantIndex % voiceChants.length]) {
                        synth.triggerAttackRelease("C4", "16n", time);
                    }
                } else {
                    synth.triggerAttackRelease("C3", "16n", time);
                }
            }
        });

        if (currentStep % 16 === 0) chantIndex++;
        currentStep++;
    }, "16n").start(0);

    // Interaction clic pour activer les pas
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left - 350;
        const my = e.clientY - rect.top - 350;
        const dist = Math.sqrt(mx*mx + my*my);
        
        circles.forEach(c => {
            if (Math.abs(dist - c.radius) < 20) {
                let angle = Math.atan2(my, mx) + Math.PI/2;
                if(angle < 0) angle += Math.PI * 2;
                let step = Math.floor((angle / (Math.PI * 2)) * c.steps);
                c.activeSteps[step] = !c.activeSteps[step];
            }
        });
    });

    function togglePlay() {
        Tone.start();
        isPlaying ? Tone.Transport.stop() : Tone.Transport.start();
        isPlaying = !isPlaying;
        document.getElementById('playBtn').textContent = isPlaying ? "Stop" : "▶ Play";
    }
</script>
</body>
</html>
