<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Roda de Maracatu - Samambaia Pro Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --control-bg: #252525;
            --text-main: #f5f5f5;
            --text-muted: #888;
            --accent-gold: #f1c40f;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #left-panel {
            width: 320px;
            background-color: var(--panel-bg);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .panel-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        #mixer-section { flex-grow: 1; overflow-y: auto; }

        .track-mixer {
            background-color: var(--control-bg);
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .track-mixer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .track-name { font-size: 13px; font-weight: bold; }
        .track-mute-solo { display: flex; gap: 4px; }

        .btn-mute-solo {
            width: 24px; height: 24px; background-color: #333; color: #fff;
            border: none; border-radius: 4px; font-weight: bold; font-size: 10px; cursor: pointer;
        }
        .btn-mute-solo.mute-on { background-color: var(--accent-red); }
        .btn-mute-solo.solo-on { background-color: var(--accent-gold); color: #000; }

        .fader-group { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .fader { flex-grow: 1; -webkit-appearance: none; height: 6px; border-radius: 3px; background: #444; outline: none; }
        .fader::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer; }

        .vol-meter-bg { width: 35px; height: 8px; background-color: #000; border-radius: 2px; position: relative; overflow: hidden; }
        .vol-meter-bar { height: 100%; background-color: var(--accent-green); width: 0%; }

        .steps-config { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-muted); border-top: 1px dashed #444; padding-top: 6px; }
        .steps-config input { width: 40px; background: #111; border: 1px solid #555; color: #fff; padding: 2px; border-radius: 4px; text-align: center; }

        #right-panel { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #top-bar {
            height: 60px; background-color: var(--panel-bg); border-bottom: 1px solid #333;
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 10;
        }

        #header-main { display: flex; align-items: center; gap: 10px; }
        #header-title-text { font-size: 16px; font-weight: bold; letter-spacing: 1px; }
        #global-controls { display: flex; align-items: center; gap: 10px; }

        .preset-select {
            background-color: var(--control-bg); color: var(--text-main);
            border: 1px solid #444; padding: 5px; border-radius: 6px; font-size: 12px; font-weight: bold;
        }

        button.control-btn {
            background-color: #333; color: #fff; border: 1px solid #444; padding: 6px 14px;
            border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; transition: background-color 0.2s;
        }
        button.control-btn:hover { background-color: #444; }
        button#playBtn { background-color: var(--accent-green); border-color: var(--accent-green); min-width: 90px; }
        button#playBtn.playing { background-color: var(--accent-red); border-color: var(--accent-red); }
        button#recBtn { background-color: #d35400; border-color: #d35400; }
        button#recBtn.recording { background-color: var(--accent-red); animation: pulse 1s infinite; }
        button#metroBtn.metro-on { background-color: var(--accent-gold); color: #000; border-color: var(--accent-gold); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .control-separator { width: 1px; height: 24px; background-color: #444; margin: 0 4px; }
        
        label.control-label { font-size: 12px; display: flex; align-items: center; gap: 4px; color: var(--text-main); font-weight: bold; }
        #bpm { width: 44px; background-color: var(--control-bg); color: var(--text-main); border: 1px solid #444; padding: 4px; border-radius: 6px; text-align: center; }

        #canvas-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; background-color: var(--bg-dark); }
        canvas { border-radius: 50%; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #fileInput { display: none; }
        
        #loading-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(18,18,18,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
            font-size: 18px; font-weight: bold; color: var(--accent-gold);
        }
    </style>
</head>
<body>

    <div id="loading-overlay">🌿 Chargement des voix de la Roda Samambaia...</div>

    <div id="left-panel">
        <div class="panel-title">🎛️ Mixer Table</div>
        <div id="mixer-section">
            <div id="tracks-mixer-container"></div>
        </div>
    </div>

    <div id="right-panel">
        <div id="top-bar">
            <div id="header-main">
                <span style="color:var(--accent-green); font-size:22px;">🌿</span>
                <span id="header-title-text">MARACATU SAMAMBAIA</span>
            </div>
            <div id="global-controls">
                <select id="presetSelect" class="preset-select" onchange="loadPreset(this.value)">
                    <option value="">-- Sélectionner un Rythme --</option>
                    <option value="baque-virado">Baque Virado Traditionnel</option>
                    <option value="baque-arrasto">Baque Arrasto / Agalo</option>
                </select>
                
                <div class="control-separator"></div>

                <label class="control-label">BPM: <input type="number" id="bpm" value="100" min="40" max="240"></label>
                
                <div class="control-separator"></div>
                
                <button id="metroBtn" class="control-btn">⏱️ Métronome</button>
                <button id="addCircleBtn" class="control-btn">+ Ajouter</button>
                <button id="clearBtn" class="control-btn">Vider</button>
                <button id="recBtn" class="control-btn">🔴 Rec Audio</button>
                <button id="saveBtn" class="control-btn" style="background:#2980b9;">💾 Sauver</button>
                <button id="loadBtn" class="control-btn" style="background:#2980b9;">📂 Charger</button>
                <input type="file" id="fileInput" accept=".json">
                
                <div class="control-separator"></div>
                <button id="playBtn" class="control-btn">▶ Démarrer</button>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="canvas" width="760" height="760"></canvas>
        </div>
    </div>

    <script>
        // Configuration de la latence web et du swing d'office pour le sotaque
        Tone.context.lookAhead = 0.04; 
        Tone.context.latencyHint = "interactive";
        Tone.Transport.swing = 0.35; 

        const recorder = new Tone.Recorder();
        Tone.Destination.connect(recorder);

        // --- BUS DE MIXAGE ---
        const channels = {}; const meters = {}; const samplers = {};

        const instrumentsConfig = [
            { id: 'marcante', name: 'Alfaia Marcante', type: 'hands', path: 'Alfaia/Marcante', colors: { 'd': '#5a0000', 'D': '#8b0000', 'g': '#ff7676', 'G': '#ff4d4d', text: '#fff' } },
            { id: 'meiao', name: 'Alfaia Meião', type: 'hands', path: 'Alfaia/Meiao', colors: { 'd': '#a04000', 'D': '#d35400', 'g': '#fbc531', 'G': '#f39c12', text: '#fff' } },
            { id: 'repique', name: 'Alfaia Repique', type: 'hands', path: 'Alfaia/Repique', colors: { 'd': '#b59510', 'D': '#f1c40f', 'g': '#fff5cc', 'G': '#ffeaa7', text: '#121212' } },
            { id: 'caixa', name: 'Caixa', type: 'hands', path: 'Caixa', colors: { 'd': '#320b61', 'D': '#4a148c', 'g': '#be5be0', 'G': '#9c27b0', text: '#fff' } },
            { id: 'gongue', name: 'Gonguê', type: 'gongue', path: 'Gongue', colors: { 'grv': '#222222', 'GRV': '#000000', 'aig': '#7f8c8d', 'AIG': '#bdc3c7', text: '#fff' } },
            { id: 'agbe', name: 'Agbê', type: 'shake', path: 'Graines/Agbe', colors: { 'p': '#113b14', 'P': '#1b5e20', 't': '#74d478', 'T': '#4caf50', text: '#fff' } },
            { id: 'mineiro', name: 'Mineiro', type: 'shake', path: 'Graines/Mineiro', colors: { 'p': '#113b14', 'P': '#1b5e20', 't': '#74d478', 'T': '#4caf50', text: '#fff' } },
            { id: 'chant', name: 'Chant', type: 'voice', path: 'internal', colors: { active: '#2980b9', text: '#fff' } }
        ];

        const bChantSynth = new Tone.Synth({ volume: -10, envelope: { attack: 0.05, decay: 0.2 } });
        const bMetroClick = new Tone.MetalSynth({ volume: -14, frequency: 1200, envelope: { attack: 0.001, decay: 0.05 } }).toDestination();

        instrumentsConfig.forEach(inst => {
            channels[inst.id] = new Tone.Channel({ volume: 0 }).toDestination();
            meters[inst.id] = new Tone.Meter();
            channels[inst.id].connect(meters[inst.id]);

            if (inst.id === 'chant') {
                bChantSynth.connect(channels[inst.id]);
            } else {
                let urls = inst.type === 'gongue' ? 
                    { "faible-grave": "faible-grave.wav", "fort-grave": "fort-grave.wav", "faible-aigue": "faible-aigue.wav", "fort-aigue": "fort-aigue.wav" } : 
                    { "faible": "faible.wav", "fort": "fort.wav" };

                samplers[inst.id] = new Tone.Players({
                    urls: urls,
                    baseUrl: `sons-maracatu/${inst.path}/`,
                    onload: () => checkAllLoaded()
                }).connect(channels[inst.id]);
            }
        });

        let loadedCount = 0;
        function checkAllLoaded() {
            loadedCount++;
            if (loadedCount >= 6) { document.getElementById('loading-overlay').style.display = 'none'; }
        }
        setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 2000);

        let circles = [];
        let isMetroOn = false;

        // --- PRESETS DE REPERTOIRE ---
        function loadPreset(presetName) {
            if (!presetName) return;
            if (presetName === 'baque-virado') {
                circles = [
                    { id: 1, radius: 100, steps: 4, activeSteps: ['D', 0, 'd', 0], instrumentIdx: 0, lyrics: [], isMute: false, isSolo: false, volumeVal: 100 },   
                    { id: 2, radius: 135, steps: 8, activeSteps: ['D', 0, 'd', 'g', 0, 'D', 0, 'G'], instrumentIdx: 1, lyrics: [], isMute: false, isSolo: false, volumeVal: 100 }, 
                    { id: 3, radius: 170, steps: 8, activeSteps: ['GRV', 0, 'AIG', 'GRV', 0, 'AIG', 'GRV', 0], instrumentIdx: 4, lyrics: [], isMute: false, isSolo: false, volumeVal: 100 }, 
                    { id: 4, radius: 205, steps: 8, activeSteps: ['P', 'T', 'p', 't', 'P', 'T', 'p', 't'], instrumentIdx: 5, lyrics: [], isMute: false, isSolo: false, volumeVal: 100 }
                ];
            } else if (presetName === 'baque-arrasto') {
                circles = [
                    { id: 1, radius: 100, steps: 4, activeSteps: ['D', 'd', 0, 'D'], instrumentIdx: 0, lyrics: [], isMute: false, isSolo: false, volumeVal: 100 },   
                    { id: 2, radius: 135, steps: 4, activeSteps: ['D', 0, 'D', 'G'], instrumentIdx: 1, lyrics: [], isMute: false, isSolo: false, volumeVal: 100 }, 
                    { id: 3, radius: 170, steps: 4, activeSteps: ['GRV', 'AIG', 'GRV', 'AIG'], instrumentIdx: 4, lyrics: [], isMute: false, isSolo: false, volumeVal: 100 },
                    { id: 4, radius: 205, steps: 8, activeSteps: ['P', 0, 'T', 'P', 0, 'T', 'P', 'T'], instrumentIdx: 6, lyrics: [], isMute: false, isSolo: false, volumeVal: 100 }
                ];
            }
            renderMixer();
        }

        // --- GRAPHISMES FOND TAMBOUR ---
        const bgImg = new Image(); bgImg.src = 'tambour.png';
        let bgLoaded = false; bgImg.onload = () => { bgLoaded = true; };

        const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2; const centerY = canvas.height / 2;
        let isPlaying = false; let isRecording = false;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (bgLoaded) {
                ctx.save(); ctx.beginPath(); ctx.arc(centerX, centerY, 310, 0, Math.PI * 2); ctx.clip();
                ctx.drawImage(bgImg, centerX - 310, centerY - 310, 620, 620); ctx.restore();
                ctx.beginPath(); ctx.arc(centerX, centerY, 310, 0, Math.PI * 2); ctx.fillStyle = 'rgba(15, 15, 15, 0.45)'; ctx.fill();
            } else {
                ctx.fillStyle = '#161616'; ctx.beginPath(); ctx.arc(centerX, centerY, 310, 0, Math.PI * 2); ctx.fill();
            }

            if (isMetroOn && isPlaying && currentStepIndex % 24 === 0) {
                ctx.beginPath(); ctx.arc(centerX, centerY, 325, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(241, 196, 15, 0.4)'; ctx.lineWidth = 4; ctx.stroke();
            }

            ctx.beginPath(); ctx.arc(centerX, centerY, 315, 0, Math.PI * 2); ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 8; ctx.stroke();

            let currentAngle = -Math.PI / 2;
            if (isPlaying && Tone.Transport.state === "started") {
                const bpm = Tone.Transport.bpm.value;
                const progressInMeasure = (Tone.Transport.seconds % ((60 / bpm) * 4)) / ((60 / bpm) * 4);
                currentAngle = -Math.PI / 2 + (progressInMeasure * Math.PI * 2);
            }

            circles.forEach((circle) => {
                let hasActiveSolo = circles.some(c => c.isSolo);
                let isTargeted = hasActiveSolo ? circle.isSolo : !circle.isMute;
                
                ctx.save(); ctx.globalAlpha = isTargeted ? 1.0 : 0.15;
                ctx.beginPath(); ctx.arc(centerX, centerY, circle.radius, 0, Math.PI * 2);
                ctx.strokeStyle = circle.isSolo ? '#f1c40f' : 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1.5; ctx.stroke();

                const inst = instrumentsConfig[circle.instrumentIdx];
                for (let i = 0; i < circle.steps; i++) {
                    const stepAngle = -Math.PI / 2 + (i * (Math.PI * 2 / circle.steps));
                    const x = centerX + Math.cos(stepAngle) * circle.radius; const y = centerY + Math.sin(stepAngle) * circle.radius;
                    
                    let state = circle.activeSteps[i]; let fillColor = 'rgba(40,40,40,0.6)'; let radiusSize = 5; let isAccent = false;
                    let textSymbol = state;

                    if (state !== 0) {
                        radiusSize = 10;
                        if (inst.type === 'voice') {
                            fillColor = inst.colors.active;
                            textSymbol = (circle.lyrics && circle.lyrics[i]) ? circle.lyrics[i] : 'X';
                        } else {
                            fillColor = inst.colors[state] || '#fff';
                            isAccent = (state === state.toUpperCase());
                            radiusSize = isAccent ? 12 : 9;
                        }
                    }

                    if (isAccent) {
                        ctx.beginPath(); ctx.arc(x, y, radiusSize + 4, 0, Math.PI * 2);
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.lineWidth = 2; ctx.stroke();
                    }

                    ctx.beginPath(); ctx.arc(x, y, radiusSize, 0, Math.PI * 2); ctx.fillStyle = fillColor; ctx.fill();
                    ctx.strokeStyle = '#121212'; ctx.lineWidth = 1.5; ctx.stroke();
                    
                    if (state !== 0) {
                        ctx.fillStyle = inst.colors.text || '#fff'; ctx.font = '
